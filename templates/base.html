<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Auth App{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white; border-radius: 12px;
      padding: 40px; width: 100%; max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; margin-bottom: 24px; color: #333; }
    label { font-size: 14px; color: #555; display: block; margin-bottom: 4px; }
    input {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 15px; margin-bottom: 16px;
      transition: border 0.2s;
    }
    input:focus { border-color: #4f46e5; outline: none; }
    button {
      width: 100%; padding: 12px; background: #4f46e5;
      color: white; border: none; border-radius: 8px;
      font-size: 16px; cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    .link { text-align: center; margin-top: 16px; font-size: 14px; color: #555; }
    .link a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    .alert {
      padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
      font-size: 14px;
    }
    .alert.success { background: #d1fae5; color: #065f46; }
    .alert.danger  { background: #fee2e2; color: #991b1b; }
    .alert.info    { background: #dbeafe; color: #1e40af; }
  </style>
</head>
<body>
  <div class="card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
